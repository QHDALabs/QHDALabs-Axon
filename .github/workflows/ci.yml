name: CI

# Verification-before-discovery is enforced at two levels:
#   typecheck — mypy makes the contract a STATIC guarantee (no path from a raw
#               candidate to a hypothesis even type-checks).
#   test      — pytest exercises it at runtime.
#
# qhda-core is PUBLIC on GitHub but NOT published to PyPI, so it is installed from
# git BEFORE Axon. With it already present, Axon's `qhda-core` dependency resolves
# to the installed copy instead of being looked up on PyPI. No token/secret needed.
#
# Job names are single tokens ("typecheck", "test") so they can be referenced as
# required status-check contexts without spaces.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install qhda-core (git) then Axon
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/QHDALabs/qhda-core.git"
          python -m pip install -e .
          pip install pytest mypy
      - name: mypy (strict; config in pyproject.toml)
        run: mypy src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install qhda-core (git) then Axon
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/QHDALabs/qhda-core.git"
          python -m pip install -e .
          pip install pytest mypy
      - name: pytest
        run: pytest -q
